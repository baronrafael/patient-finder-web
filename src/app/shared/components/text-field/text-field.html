<div class="text-field min-w-0">
  <label class="field-label" [for]="inputId()">{{ label() }}</label>
  <input
    class="input input-bordered mt-2 min-h-12 w-full min-w-0 bg-white text-base"
    [class.search-input]="refinedBorder()"
    [id]="inputId()"
    [type]="type()"
    [attr.autocomplete]="autocomplete()"
    [attr.placeholder]="placeholder()"
    [formField]="field()"
    (input)="inputted.emit()"
    (blur)="blurred.emit()"
  />
</div>
