<label class="field-label" [for]="inputId()">{{ label() }}</label>
<div class="search-shell w-full min-w-0">
  <svg class="search-shell-icon" aria-hidden="true" viewBox="0 0 20 20" fill="currentColor">
    <path
      fill-rule="evenodd"
      d="M9 3.5a5.5 5.5 0 1 0 0 11 5.5 5.5 0 0 0 0-11ZM2 9a7 7 0 1 1 12.452 4.391l3.328 3.329a.75.75 0 1 1-1.06 1.06l-3.329-3.328A7 7 0 0 1 2 9Z"
      clip-rule="evenodd"
    />
  </svg>
  <input
    class="search-input search-shell-input input input-bordered min-h-12 w-full min-w-0 bg-white text-base"
    [id]="inputId()"
    type="search"
    [attr.autocomplete]="autocomplete()"
    [attr.inputmode]="inputmode()"
    [attr.placeholder]="placeholder()"
    [formField]="field()"
  />
</div>
