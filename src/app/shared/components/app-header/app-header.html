<header class="app-header">
  <div class="app-header__inner">
    <div class="app-header__row">
      <p class="hero-kicker">Sismo Venezuela 2026</p>
      <a
        class="app-header__admin-link"
        [routerLink]="adminPath()"
        aria-label="Acceso admin"
        title="Acceso admin"
      >
        <svg aria-hidden="true" viewBox="0 0 20 20" fill="currentColor">
          <path
            fill-rule="evenodd"
            d="M5 9V7a5 5 0 0110 0v2a2 2 0 012 2v5a2 2 0 01-2 2H5a2 2 0 01-2-2v-5a2 2 0 012-2zm8-2v2H7V7a3 3 0 016 0z"
            clip-rule="evenodd"
          />
        </svg>
      </a>
    </div>
    <h1 class="app-header__title">Buscador de pacientes</h1>
    <p class="app-header__subtitle">
      Ayuda a localizar familiares reportados en hospitales y centros de atención.
    </p>
    @if (updatedAt(); as updatedLabel) {
      <div class="app-header__updated" role="status" aria-live="polite">
        <div class="app-header__updated-icon" aria-hidden="true">
          <svg viewBox="0 0 20 20" fill="currentColor">
            <path
              fill-rule="evenodd"
              d="M10 18a8 8 0 100-16 8 8 0 000 16zm.75-13a.75.75 0 00-1.5 0v5c0 .414.336.75.75.75h4a.75.75 0 000-1.5h-3.25V5z"
              clip-rule="evenodd"
            />
          </svg>
        </div>
        <div class="app-header__updated-body">
          <p class="app-header__updated-label">Lista actualizada</p>
          <p class="app-header__updated-date">{{ updatedLabel }}</p>
        </div>
      </div>
    } @else {
      <p class="app-header__updated app-header__updated--pending">Cargando fecha de actualización...</p>
    }
  </div>
</header>
