<form class="search-form space-y-2" (submit)="$event.preventDefault(); onSubmit()">
  <label class="field-label" for="patient-search-query">Nombre, apellido o cédula</label>
  <div class="search-bar flex flex-col gap-2">
    <div class="search-shell">
      <svg class="search-shell-icon" aria-hidden="true" viewBox="0 0 20 20" fill="currentColor">
        <path
          fill-rule="evenodd"
          d="M9 3.5a5.5 5.5 0 1 0 0 11 5.5 5.5 0 0 0 0-11ZM2 9a7 7 0 1 1 12.452 4.391l3.328 3.329a.75.75 0 1 1-1.06 1.06l-3.329-3.328A7 7 0 0 1 2 9Z"
          clip-rule="evenodd"
        />
      </svg>
      <input
        id="patient-search-query"
        class="search-input search-shell-input input input-bordered"
        type="search"
        autocomplete="off"
        inputmode="search"
        placeholder="Ej. García, María Pérez o 28443736"
        [formField]="searchForm.query"
      />
    </div>
    <div class="flex gap-2">
      <button
        class="btn btn-primary min-h-12 flex-1 px-4 shadow-sm transition-shadow hover:shadow-md sm:flex-none"
        type="submit"
        [disabled]="loading() || pending() || !canSubmit()"
      >
        Buscar
      </button>
      @if (searchModel().query) {
        <button
          class="btn btn-soft min-h-12 px-4"
          type="button"
          (click)="onClear()"
          aria-label="Limpiar búsqueda"
        >
          Limpiar
        </button>
      }
    </div>
  </div>
  @if (slowSearch()) {
    <p class="text-xs text-amber-700" aria-live="polite">{{ slowSearchMessage }}</p>
  } @else if (pending() || loading()) {
    <p class="flex items-center gap-2 text-xs text-slate-600" aria-live="polite">
      <span class="loading loading-spinner loading-xs" aria-hidden="true"></span>
      @if (pending()) {
        {{ preparingSearchMessage }}
      } @else {
        {{ loadingResultsMessage }}
      }
    </p>
  } @else {
    <p class="text-xs leading-5 text-slate-500">{{ searchHint }}</p>
  }
</form>
