<div class="grid gap-4 sm:grid-cols-2 lg:grid-cols-1">
  <app-select-field label="Sexo" selectId="sex-filter" [field]="filterForm.sex">
    <option value="">Todos</option>
    <option value="m">Masculino</option>
    <option value="f">Femenino</option>
  </app-select-field>

  <app-select-field label="Estado" selectId="estado-filter" [field]="filterForm.estadoId">
    <option value="">Todos los estados</option>
    @for (estado of estados(); track estado.id) {
      <option [value]="estado.id" [title]="estado.name">{{ estado.name }}</option>
    }
  </app-select-field>

  <app-select-field
    label="Municipio"
    selectId="municipio-filter"
    [field]="filterForm.municipioId"
    [describedBy]="municipioDisabled() ? 'municipio-filter-hint' : null"
    [hint]="municipioDisabled() ? 'Selecciona un estado primero.' : null"
  >
    <option value="">Todos los municipios</option>
    @for (municipio of municipios(); track municipio.id) {
      <option [value]="municipio.id" [title]="municipio.name">{{ municipio.name }}</option>
    }
  </app-select-field>

  <app-select-field
    label="Parroquia"
    selectId="parroquia-filter"
    [field]="filterForm.parroquiaId"
    [describedBy]="parroquiaDisabled() ? 'parroquia-filter-hint' : null"
    [hint]="parroquiaDisabled() ? 'Selecciona un municipio primero.' : null"
  >
    <option value="">Todas las parroquias</option>
    @for (parroquia of parroquias(); track parroquia.id) {
      <option [value]="parroquia.id" [title]="parroquia.name">{{ parroquia.name }}</option>
    }
  </app-select-field>
</div>
