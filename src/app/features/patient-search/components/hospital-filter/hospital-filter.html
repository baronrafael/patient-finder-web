<div class="min-w-0">
  <label class="field-label" for="hospital-filter">Hospital o centro</label>
  <select id="hospital-filter" class="filter-select filter-select-field select select-bordered" [formField]="hospitalForm.hospitalId">
    <option value="">Todos los hospitales</option>
    @for (hospital of hospitals(); track hospital.id) {
      <option [value]="hospital.id" [title]="hospital.name + ' (' + hospital.recordCount + ')'">
        {{ hospital.name }} ({{ hospital.recordCount }})
      </option>
    }
  </select>
</div>
