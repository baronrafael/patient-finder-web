<div class="overflow-hidden rounded-xl border border-slate-200/80 bg-slate-50/60">
  <button
    class="flex w-full items-center justify-between gap-3 px-4 py-3 text-left transition-colors hover:bg-white/80"
    type="button"
    (click)="toggle.emit()"
    [attr.aria-expanded]="expanded()"
    aria-controls="optional-filters-panel"
  >
    <span class="flex min-w-0 flex-1 flex-col gap-0.5">
      <span class="flex min-w-0 items-center gap-2">
        <span class="text-sm font-semibold text-slate-900">Filtros opcionales</span>
        @if (hasActiveFilters()) {
          <span class="badge badge-outline badge-sm shrink-0 border-slate-300 bg-white text-slate-700">
            {{ activeFilterCount() }}
          </span>
        }
      </span>
      @if (hasActiveFilters() && !expanded() && collapsedSummary(); as summary) {
        <span class="truncate text-xs text-teal-700">{{ summary }}</span>
      } @else if (!hasActiveFilters()) {
        <span class="truncate text-xs text-slate-500">{{ hint }}</span>
      }
    </span>
    <svg
      aria-hidden="true"
      class="size-5 shrink-0 text-slate-500 transition-transform"
      [class.rotate-180]="expanded()"
      viewBox="0 0 20 20"
      fill="currentColor"
    >
      <path
        fill-rule="evenodd"
        d="M5.23 7.21a.75.75 0 0 1 1.06.02L10 11.168l3.71-3.94a.75.75 0 1 1 1.08 1.04l-4.25 4.5a.75.75 0 0 1-1.08 0l-4.25-4.5a.75.75 0 0 1 .02-1.06Z"
        clip-rule="evenodd"
      />
    </svg>
  </button>

  @if (expanded()) {
    <div id="optional-filters-panel" class="border-t border-slate-200 bg-white p-4">
      @if (catalogLoading()) {
        <div
          class="grid gap-4 py-1"
          aria-busy="true"
          aria-live="polite"
          aria-label="Cargando filtros"
        >
          <div class="space-y-2">
            <div class="skeleton h-3 w-28 rounded"></div>
            <div class="skeleton h-12 w-full rounded-lg"></div>
          </div>
          <div class="grid gap-4 sm:grid-cols-2 lg:grid-cols-1">
            @for (item of [1, 2, 3, 4]; track item) {
              <div class="space-y-2">
                <div class="skeleton h-3 w-16 rounded"></div>
                <div class="skeleton h-12 w-full rounded-lg"></div>
              </div>
            }
          </div>
        </div>
      } @else {
        @if (showHospitalFilter()) {
          <app-hospital-filter
            [hospitals]="hospitals()"
            [selectedHospitalId]="selectedHospitalId()"
            (hospitalChange)="hospitalChange.emit($event)"
          />
        }

        <div
          class="mt-4 border-t border-slate-100 pt-4"
          [class.mt-0]="!showHospitalFilter()"
          [class.border-t-0]="!showHospitalFilter()"
          [class.pt-0]="!showHospitalFilter()"
        >
          <p class="mb-3 text-xs font-semibold uppercase tracking-wide text-slate-500">Ubicación y sexo</p>
          <app-patient-search-filters
            [estados]="estados()"
            [municipios]="municipios()"
            [parroquias]="parroquias()"
            [selectedSex]="selectedSex()"
            [selectedEstadoId]="selectedEstadoId()"
            [selectedMunicipioId]="selectedMunicipioId()"
            [selectedParroquiaId]="selectedParroquiaId()"
            (filtersChange)="filtersChange.emit($event)"
          />
        </div>
      }
    </div>
  }
</div>
