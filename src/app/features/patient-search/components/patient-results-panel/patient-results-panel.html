<section class="min-w-0 space-y-4" aria-labelledby="results-heading">
  <div class="panel panel-compact lg:sticky lg:top-6 lg:z-10">
    <h2 id="results-heading" class="text-base font-bold text-slate-950 sm:text-lg">Resultados</h2>
    <p class="mt-1 text-sm text-slate-600" aria-live="polite">{{ resultSummary() }}</p>
  </div>

  @if (error(); as errorMessage) {
    <app-error-state [message]="errorMessage" (retry)="retry.emit()" />
  } @else if (loading() && !loadingMore()) {
    <app-loading-skeleton />
  } @else if (!hasSearched()) {
    <app-empty-state [title]="initialEmptyTitle()" [message]="initialEmptyMessage()">
      @if (hasActiveFilters()) {
        <button class="btn btn-soft btn-sm" type="button" (click)="clearAllFilters.emit()">Quitar filtros</button>
      }
      <button class="btn btn-soft btn-sm" type="button" (click)="focusSearch.emit()">Ir al buscador</button>
    </app-empty-state>
  } @else if (result()?.total === 0) {
    <app-empty-state [title]="noResultsTitle()" [message]="noResultsMessage()">
      @if (hasActiveFilters()) {
        <button class="btn btn-soft btn-sm" type="button" (click)="clearAllFilters.emit()">Quitar filtros</button>
      }
      <button class="btn btn-soft btn-sm" type="button" (click)="focusSearch.emit()">Probar otra búsqueda</button>
    </app-empty-state>
  } @else if (result(); as searchResult) {
    <app-patient-results-list
      [patients]="searchResult.items"
      [query]="query()"
      [hasMore]="searchResult.hasMore"
      [loadingMore]="loadingMore()"
      (loadMore)="loadMore.emit()"
    />
  }
</section>
