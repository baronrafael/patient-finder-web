<main class="login-page">
  <section class="login-page__card panel panel-padded">
    <p class="hero-kicker">Terremoto VE</p>
    <h1 class="login-page__title">Iniciar sesión</h1>
    <p class="page-subtitle">Acceso para voluntarios del dashboard de data entry.</p>

    <form class="form-stack" (submit)="onSubmit($event)">
      <app-text-field
        label="Email"
        inputId="login-email"
        type="email"
        autocomplete="username"
        [refinedBorder]="true"
        [field]="loginForm.email"
      />

      <app-text-field
        label="Contraseña"
        inputId="login-password"
        type="password"
        autocomplete="current-password"
        [refinedBorder]="true"
        [field]="loginForm.password"
      />

      @if (errorMessage(); as message) {
        <div class="alert alert-error text-sm" role="alert">{{ message }}</div>
      }

      <button
        class="btn btn-primary min-h-12 w-full px-4 shadow-sm transition-shadow hover:shadow-md"
        type="submit"
        [disabled]="loading()"
      >
        @if (loading()) {
          <span class="loading loading-spinner loading-sm" aria-hidden="true"></span>
          Ingresando...
        } @else {
          Iniciar sesión
        }
      </button>
    </form>
  </section>
</main>
