<app-page-shell>
  <app-page-header [title]="pageTitle()" [subtitle]="pageSubtitle()">
    <a class="btn btn-soft" [routerLink]="paths.patients">Volver a la lista</a>
  </app-page-header>

  @if (loadingPerson()) {
    <app-loading-skeleton />
  } @else if (loadError(); as message) {
    <app-error-state [message]="message" (retry)="reloadPerson()" />
  } @else if (initialValue(); as value) {
    @if (saveError(); as error) {
      <div class="alert alert-error mt-4 text-sm" role="alert">{{ error }}</div>
    }

    @if (duplicateCheckWarning(); as warning) {
      <div class="alert alert-warning mt-4 text-sm" role="status">{{ warning }}</div>
    }

    <div class="patient-form-layout">
      <div class="patient-form-layout__main">
        <app-person-form
          [initialValue]="value"
          [centerOptions]="centerOptions()"
          [lockCenter]="lockCenter()"
          [submitLabel]="submitLabel()"
          [disabled]="saving()"
          (identityChanged)="onIdentityChanged($event)"
          (identityBlurred)="onIdentityBlurred($event)"
          (submitted)="onSubmitted($event)"
        />
      </div>

      <aside class="patient-form-layout__aside">
        <app-person-match-panel
          [status]="matchStore.status()"
          [result]="matchStore.result()"
          [error]="matchStore.error()"
          (retryRequested)="matchStore.retry()"
          (viewMatch)="onDuplicateEdit($event)"
        />
      </aside>
    </div>
  }

  <app-duplicate-warning-dialog
    [open]="duplicateDialogOpen()"
    [result]="duplicateResult()"
    [confirmSubmit]="pendingSubmit() !== null"
    (dismissed)="onDuplicateDismissed()"
    (continueRegistration)="onDuplicateContinue()"
    (editMatch)="onDuplicateEdit($event)"
  />
</app-page-shell>
