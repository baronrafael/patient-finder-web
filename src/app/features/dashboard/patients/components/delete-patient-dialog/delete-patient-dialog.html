@if (open()) {
  <dialog
    class="modal modal-open"
    aria-modal="true"
    aria-labelledby="delete-patient-dialog-title"
    aria-describedby="delete-patient-dialog-description"
  >
    <div class="modal-box max-w-md">
      <h2 class="text-lg font-semibold text-slate-900" id="delete-patient-dialog-title">
        Eliminar paciente
      </h2>
      <p class="mt-2 text-sm text-slate-600" id="delete-patient-dialog-description">
        ¿Estás seguro de eliminar a <strong>{{ patientName() }}</strong>? Esta acción no se puede deshacer.
      </p>

      @if (errorMessage(); as message) {
        <div class="alert alert-error mt-4 text-sm" role="alert">{{ message }}</div>
      }

      <div class="modal-action mt-6">
        <button class="btn btn-soft" type="button" [disabled]="loading()" (click)="onDismiss()">
          Cancelar
        </button>
        <button
          class="btn btn-error"
          type="button"
          [disabled]="loading()"
          (click)="onConfirm()"
        >
          {{ loading() ? 'Eliminando…' : 'Eliminar' }}
        </button>
      </div>
    </div>

    <form method="dialog" class="modal-backdrop">
      <button type="button" aria-label="Cerrar" [disabled]="loading()" (click)="onDismiss()"></button>
    </form>
  </dialog>
}
