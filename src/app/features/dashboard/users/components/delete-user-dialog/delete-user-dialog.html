@if (open()) {
  <dialog
    class="modal modal-open"
    aria-modal="true"
    aria-labelledby="delete-user-dialog-title"
    aria-describedby="delete-user-dialog-description"
  >
    <div class="modal-box max-w-md">
      <h2 class="text-lg font-semibold text-slate-900" id="delete-user-dialog-title">
        Desactivar voluntario
      </h2>
      <p class="mt-2 text-sm text-slate-600" id="delete-user-dialog-description">
        ¿Estás seguro de desactivar a <strong>{{ userName() }}</strong>? No podrá ingresar al dashboard.
      </p>

      @if (errorMessage(); as message) {
        <div class="alert alert-error mt-4 text-sm" role="alert">{{ message }}</div>
      }

      <div class="modal-action mt-6">
        <button class="btn btn-soft" type="button" [disabled]="loading()" (click)="onDismiss()">
          Cancelar
        </button>
        <button class="btn btn-error" type="button" [disabled]="loading()" (click)="onConfirm()">
          {{ loading() ? 'Desactivando…' : 'Desactivar' }}
        </button>
      </div>
    </div>

    <form method="dialog" class="modal-backdrop">
      <button type="button" aria-label="Cerrar" [disabled]="loading()" (click)="onDismiss()"></button>
    </form>
  </dialog>
}
