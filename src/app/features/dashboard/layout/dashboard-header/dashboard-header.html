<header class="dashboard-header">
  <div class="dashboard-header__start">
    <h1 class="dashboard-header__title">Panel de voluntarios</h1>
  </div>

  <div class="dashboard-header__actions">
    <a class="btn btn-soft btn-sm" [routerLink]="publicPath">Buscador público</a>
    @if (user(); as currentUser) {
      <a class="dashboard-header__user" [routerLink]="paths.profile">{{ currentUser.name || currentUser.email }}</a>
    }
    <button class="btn btn-soft btn-sm" type="button" (click)="logout.emit()">Cerrar sesión</button>
  </div>
</header>
